<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 560" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ad" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="1480" height="560" fill="#ffffff"/>
  <line x1="740" y1="40" x2="740" y2="520" stroke="#cccccc" stroke-width="2"/>

  <!-- ===== LEFT: Reversibility ===== -->
  <text x="370" y="64" text-anchor="middle" font-size="34" fill="#1a1a1a" font-weight="700">Reversibility</text>
  <text x="370" y="102" text-anchor="middle" font-size="25" fill="#1a1a1a">recover the graph from the sequence: no information lost</text>

  <g stroke="#1a1a1a" stroke-width="3">
    <line x1="305" y1="185" x2="435" y2="185"/>
    <line x1="435" y1="185" x2="370" y2="290"/>
    <line x1="370" y1="290" x2="305" y2="185"/>
  </g>
  <g font-size="28" fill="#1a1a1a" text-anchor="middle">
    <circle cx="305" cy="185" r="28" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="305" y="195">C</text>
    <circle cx="435" cy="185" r="28" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="435" y="195">O</text>
    <circle cx="370" cy="290" r="28" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="370" y="300">N</text>
  </g>

  <line x1="370" y1="342" x2="370" y2="392" stroke="#1a1a1a" stroke-width="3" marker-end="url(#ad)"/>
  <polygon points="361,346 379,346 370,331" fill="#1a1a1a"/>
  <text x="503" y="374" text-anchor="middle" font-size="22" fill="#1a1a1a">serialize / decode</text>

  <rect x="250" y="410" width="240" height="64" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="370" y="452" text-anchor="middle" font-size="28" fill="#1a1a1a" font-family="'Courier New', monospace">C-O-N-C</text>

  <!-- ===== RIGHT: Determinism ===== -->
  <text x="1110" y="64" text-anchor="middle" font-size="34" fill="#1a1a1a" font-weight="700">Determinism</text>
  <text x="1110" y="102" text-anchor="middle" font-size="25" fill="#1a1a1a">isomorphic graphs always give the identical sequence</text>

  <!-- graph G (layout 1) -->
  <g stroke="#1a1a1a" stroke-width="3">
    <line x1="905" y1="175" x2="1005" y2="175"/>
    <line x1="1005" y1="175" x2="955" y2="265"/>
    <line x1="955" y1="265" x2="905" y2="175"/>
  </g>
  <g font-size="26" fill="#1a1a1a" text-anchor="middle">
    <circle cx="905" cy="175" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="905" y="184">C</text>
    <circle cx="1005" cy="175" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="1005" y="184">O</text>
    <circle cx="955" cy="265" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="955" y="274">N</text>
  </g>

  <!-- graph G' (same graph, redrawn) -->
  <g stroke="#1a1a1a" stroke-width="3">
    <line x1="1270" y1="150" x2="1210" y2="260"/>
    <line x1="1270" y1="150" x2="1330" y2="260"/>
    <line x1="1210" y1="260" x2="1330" y2="260"/>
  </g>
  <g font-size="26" fill="#1a1a1a" text-anchor="middle">
    <circle cx="1270" cy="150" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="1270" y="159">N</text>
    <circle cx="1210" cy="260" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="1210" y="269">C</text>
    <circle cx="1330" cy="260" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="1330" y="269">O</text>
  </g>

  <!-- converging arrows to one box -->
  <line x1="955" y1="300" x2="1050" y2="405" stroke="#1a1a1a" stroke-width="3" marker-end="url(#ad)"/>
  <line x1="1270" y1="295" x2="1170" y2="405" stroke="#1a1a1a" stroke-width="3" marker-end="url(#ad)"/>

  <rect x="990" y="412" width="240" height="64" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="1110" y="454" text-anchor="middle" font-size="28" fill="#1a1a1a" font-family="'Courier New', monospace">C-O-N-C</text>
</svg>
