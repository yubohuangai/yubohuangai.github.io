<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 470" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="pm" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="1440" height="470" fill="#ffffff"/>

  <!-- LEFT graph: nodes numbered 1..4 -->
  <g stroke="#1a1a1a" stroke-width="3">
    <line x1="230" y1="100" x2="130" y2="240"/>
    <line x1="230" y1="100" x2="330" y2="240"/>
    <line x1="130" y1="240" x2="330" y2="240"/>
    <line x1="130" y1="240" x2="230" y2="360"/>
  </g>
  <g font-size="30" fill="#1a1a1a" text-anchor="middle">
    <circle cx="230" cy="100" r="30" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="230" y="110">1</text>
    <circle cx="130" cy="240" r="30" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="130" y="250">2</text>
    <circle cx="330" cy="240" r="30" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="330" y="250">3</text>
    <circle cx="230" cy="360" r="30" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="230" y="370">4</text>
  </g>
  <text x="230" y="430" text-anchor="middle" font-size="20" fill="#1a1a1a">edges: 1-2, 1-3, 2-3, 2-4</text>

  <!-- middle: relabel arrow -->
  <line x1="560" y1="230" x2="830" y2="230" stroke="#1a1a1a" stroke-width="3" marker-end="url(#pm)"/>
  <text x="695" y="208" text-anchor="middle" font-size="24" fill="#1a1a1a" font-weight="600">relabel the nodes</text>
  <text x="695" y="262" text-anchor="middle" font-size="22" fill="#1a1a1a" font-family="'Courier New', monospace">1&#8594;3, 2&#8594;1, 3&#8594;4, 4&#8594;2</text>

  <!-- RIGHT graph: SAME positions and edges, numbers permuted -->
  <g stroke="#1a1a1a" stroke-width="3">
    <line x1="1110" y1="100" x2="1010" y2="240"/>
    <line x1="1110" y1="100" x2="1210" y2="240"/>
    <line x1="1010" y1="240" x2="1210" y2="240"/>
    <line x1="1010" y1="240" x2="1110" y2="360"/>
  </g>
  <g font-size="30" fill="#1a1a1a" text-anchor="middle">
    <circle cx="1110" cy="100" r="30" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="1110" y="110">3</text>
    <circle cx="1010" cy="240" r="30" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="1010" y="250">1</text>
    <circle cx="1210" cy="240" r="30" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="1210" y="250">4</text>
    <circle cx="1110" cy="360" r="30" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="1110" y="370">2</text>
  </g>
  <text x="1110" y="430" text-anchor="middle" font-size="20" fill="#1a1a1a">edges: 3-1, 3-4, 1-4, 1-2</text>
</svg>
