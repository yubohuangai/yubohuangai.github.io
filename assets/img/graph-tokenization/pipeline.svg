<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 470" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrowback" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8a8a8a"/>
    </marker>
  </defs>
  <rect width="1680" height="470" fill="#ffffff"/>

  <!-- Stage 1: graph -->
  <g stroke="#1a1a1a" stroke-width="3">
    <line x1="120" y1="150" x2="210" y2="110"/>
    <line x1="210" y1="110" x2="300" y2="150"/>
    <line x1="210" y1="110" x2="210" y2="215"/>
    <line x1="120" y1="150" x2="165" y2="240"/>
    <line x1="300" y1="150" x2="255" y2="240"/>
  </g>
  <g font-size="30" fill="#1a1a1a" text-anchor="middle">
    <circle cx="120" cy="150" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="120" y="160">C</text>
    <circle cx="210" cy="110" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="210" y="120">C</text>
    <circle cx="300" cy="150" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="300" y="160">O</text>
    <circle cx="210" cy="215" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="210" y="225">N</text>
    <circle cx="165" cy="240" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="165" y="250">O</text>
    <circle cx="255" cy="240" r="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="3"/><text x="255" y="250">C</text>
  </g>
  <text x="210" y="320" text-anchor="middle" font-size="27" fill="#1a1a1a" font-weight="600">labeled graph</text>

  <!-- arrow 1 -->
  <line x1="350" y1="175" x2="470" y2="175" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="410" y="158" text-anchor="middle" font-size="24" fill="#1a1a1a" font-weight="600">serialize</text>

  <!-- Stage 2: symbol sequence -->
  <rect x="500" y="138" width="330" height="74" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="665" y="186" text-anchor="middle" font-size="30" fill="#1a1a1a" font-family="'Courier New', monospace">C=O-C-N-O-C</text>
  <text x="665" y="320" text-anchor="middle" font-size="27" fill="#1a1a1a" font-weight="600">symbol sequence</text>

  <!-- arrow 2 -->
  <line x1="850" y1="175" x2="970" y2="175" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="910" y="158" text-anchor="middle" font-size="24" fill="#1a1a1a" font-weight="600">BPE</text>

  <!-- Stage 3: tokens -->
  <g>
    <rect x="1000" y="142" width="66" height="66" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="2.5"/>
    <rect x="1074" y="142" width="66" height="66" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="2.5"/>
    <rect x="1148" y="142" width="66" height="66" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="2.5"/>
  </g>
  <g font-size="28" fill="#1a1a1a" text-anchor="middle">
    <text x="1033" y="185">T₁</text><text x="1107" y="185">T₂</text><text x="1181" y="185">T₃</text>
  </g>
  <text x="1107" y="320" text-anchor="middle" font-size="27" fill="#1a1a1a" font-weight="600">discrete tokens</text>

  <!-- arrow 3 -->
  <line x1="1234" y1="175" x2="1354" y2="175" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 4: Transformer -->
  <rect x="1384" y="120" width="256" height="112" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="1512" y="166" text-anchor="middle" font-size="32" fill="#1a1a1a" font-weight="700">Transformer</text>
  <text x="1512" y="202" text-anchor="middle" font-size="24" fill="#1a1a1a">BERT / GPT</text>

  <!-- lossless decode back arrow -->
  <path d="M1107 360 L1107 410 L210 410 L210 360" fill="none" stroke="#8a8a8a" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#arrowback)"/>
  <text x="660" y="445" text-anchor="middle" font-size="24" fill="#8a8a8a" font-weight="600">lossless decode (recover the graph up to isomorphism)</text>
</svg>
