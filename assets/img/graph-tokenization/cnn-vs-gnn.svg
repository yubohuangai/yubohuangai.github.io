<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 540" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="cg" markerWidth="10" markerHeight="10" refX="7.5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="1460" height="540" fill="#ffffff"/>

  <text x="730" y="44" text-anchor="middle" font-size="27" fill="#1a1a1a" font-weight="600">Same recipe: update each unit by aggregating its neighbours</text>
  <line x1="730" y1="78" x2="730" y2="500" stroke="#cccccc" stroke-width="2"/>

  <!-- LEFT: CNN on a grid -->
  <text x="360" y="118" text-anchor="middle" font-size="30" fill="#1a1a1a" font-weight="700">CNN on a grid</text>
  <!-- 5x5 grid -->
  <g fill="#ffffff" stroke="#d0d0d0" stroke-width="2">
    <rect x="230" y="160" width="56" height="56"/><rect x="286" y="160" width="56" height="56"/><rect x="342" y="160" width="56" height="56"/><rect x="398" y="160" width="56" height="56"/><rect x="454" y="160" width="56" height="56"/>
    <rect x="230" y="216" width="56" height="56"/><rect x="286" y="216" width="56" height="56"/><rect x="342" y="216" width="56" height="56"/><rect x="398" y="216" width="56" height="56"/><rect x="454" y="216" width="56" height="56"/>
    <rect x="230" y="272" width="56" height="56"/><rect x="286" y="272" width="56" height="56"/><rect x="342" y="272" width="56" height="56"/><rect x="398" y="272" width="56" height="56"/><rect x="454" y="272" width="56" height="56"/>
    <rect x="230" y="328" width="56" height="56"/><rect x="286" y="328" width="56" height="56"/><rect x="342" y="328" width="56" height="56"/><rect x="398" y="328" width="56" height="56"/><rect x="454" y="328" width="56" height="56"/>
    <rect x="230" y="384" width="56" height="56"/><rect x="286" y="384" width="56" height="56"/><rect x="342" y="384" width="56" height="56"/><rect x="398" y="384" width="56" height="56"/><rect x="454" y="384" width="56" height="56"/>
  </g>
  <!-- 3x3 receptive field around centre + centre filled -->
  <rect x="286" y="216" width="168" height="168" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <rect x="342" y="272" width="56" height="56" fill="#1a1a1a"/>
  <!-- arrows from the 4 orthogonal neighbours into centre -->
  <g stroke="#1a1a1a" stroke-width="2.5">
    <line x1="370" y1="244" x2="370" y2="270" marker-end="url(#cg)"/>
    <line x1="370" y1="356" x2="370" y2="330" marker-end="url(#cg)"/>
    <line x1="314" y1="300" x2="340" y2="300" marker-end="url(#cg)"/>
    <line x1="426" y1="300" x2="400" y2="300" marker-end="url(#cg)"/>
  </g>
  <text x="360" y="478" text-anchor="middle" font-size="22" fill="#1a1a1a">a pixel mixes a fixed 3&#215;3 grid neighbourhood</text>

  <!-- RIGHT: GNN on a graph -->
  <text x="1095" y="118" text-anchor="middle" font-size="30" fill="#1a1a1a" font-weight="700">GNN on a graph</text>
  <!-- faint outer nodes -->
  <g stroke="#cccccc" stroke-width="2"><line x1="940" y1="200" x2="870" y2="160"/><line x1="1250" y1="200" x2="1320" y2="165"/></g>
  <g fill="#f7f7f7" stroke="#cccccc" stroke-width="2"><circle cx="870" cy="160" r="16"/><circle cx="1320" cy="165" r="16"/></g>
  <!-- neighbour -> centre arrows -->
  <g stroke="#1a1a1a" stroke-width="3">
    <line x1="958" y1="212" x2="1052" y2="284" marker-end="url(#cg)"/>
    <line x1="1232" y1="212" x2="1138" y2="284" marker-end="url(#cg)"/>
    <line x1="980" y1="380" x2="1058" y2="320" marker-end="url(#cg)"/>
    <line x1="1210" y1="380" x2="1132" y2="320" marker-end="url(#cg)"/>
  </g>
  <!-- neighbour nodes -->
  <g fill="#f2f2f2" stroke="#1a1a1a" stroke-width="2.5">
    <circle cx="940" cy="200" r="26"/><circle cx="1250" cy="200" r="26"/><circle cx="965" cy="395" r="26"/><circle cx="1225" cy="395" r="26"/>
  </g>
  <!-- centre node -->
  <circle cx="1095" cy="300" r="34" fill="#1a1a1a"/>
  <text x="1095" y="479" text-anchor="middle" font-size="22" fill="#1a1a1a">a node mixes its irregular graph neighbours</text>
</svg>
