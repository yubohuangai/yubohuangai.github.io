<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 450" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1480" height="450" fill="#ffffff"/>
  <g stroke="#cccccc" stroke-width="1.5">
    <line x1="370" y1="40" x2="370" y2="360"/>
    <line x1="740" y1="40" x2="740" y2="360"/>
    <line x1="1110" y1="40" x2="1110" y2="360"/>
  </g>

  <!-- Panel 1: Scene graph -->
  <g stroke="#1a1a1a" stroke-width="2.5">
    <line x1="185" y1="105" x2="120" y2="215"/>
    <line x1="245" y1="220" x2="155" y2="235"/>
  </g>
  <g font-size="22" fill="#1a1a1a" text-anchor="middle">
    <ellipse cx="185" cy="85" rx="58" ry="26" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="2.5"/><text x="185" y="93">person</text>
    <ellipse cx="110" cy="235" rx="46" ry="24" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="2.5"/><text x="110" y="243">ball</text>
    <ellipse cx="270" cy="235" rx="46" ry="24" fill="#f2f2f2" stroke="#1a1a1a" stroke-width="2.5"/><text x="270" y="243">dog</text>
  </g>
  <g font-size="17" fill="#1a1a1a" text-anchor="middle">
    <text x="120" y="155">holds</text><text x="225" y="212">chases</text>
  </g>
  <text x="190" y="410" text-anchor="middle" font-size="26" fill="#1a1a1a" font-weight="600">Scene graph</text>
  <text x="190" y="436" text-anchor="middle" font-size="18" fill="#1a1a1a">objects + relations</text>

  <!-- Panel 2: 3D mesh (triangulated surface) -->
  <g stroke="#1a1a1a" stroke-width="2" fill="none">
    <polygon points="445,95 540,70 545,160"/>
    <polygon points="445,95 545,160 460,205"/>
    <polygon points="540,70 640,105 545,160"/>
    <polygon points="545,160 640,105 650,200"/>
    <polygon points="545,160 650,200 565,225"/>
    <polygon points="460,205 545,160 565,225"/>
  </g>
  <g fill="#1a1a1a"><circle cx="445" cy="95" r="4"/><circle cx="540" cy="70" r="4"/><circle cx="640" cy="105" r="4"/><circle cx="460" cy="205" r="4"/><circle cx="545" cy="160" r="4"/><circle cx="650" cy="200" r="4"/><circle cx="565" cy="225" r="4"/></g>
  <text x="555" y="410" text-anchor="middle" font-size="26" fill="#1a1a1a" font-weight="600">3D mesh</text>
  <text x="555" y="436" text-anchor="middle" font-size="18" fill="#1a1a1a">vertices + faces</text>

  <!-- Panel 3: Point cloud (dots + a few k-NN edges) -->
  <g stroke="#bdbdbd" stroke-width="1.6">
    <line x1="800" y1="90" x2="850" y2="120"/><line x1="850" y1="120" x2="900" y2="100"/>
    <line x1="900" y1="100" x2="960" y2="140"/><line x1="850" y1="120" x2="870" y2="190"/>
    <line x1="870" y1="190" x2="930" y2="210"/><line x1="960" y1="140" x2="1010" y2="180"/>
    <line x1="930" y1="210" x2="1000" y2="235"/><line x1="800" y1="90" x2="820" y2="160"/>
  </g>
  <g fill="#1a1a1a">
    <circle cx="800" cy="90" r="6"/><circle cx="850" cy="120" r="6"/><circle cx="900" cy="100" r="6"/>
    <circle cx="960" cy="140" r="6"/><circle cx="870" cy="190" r="6"/><circle cx="930" cy="210" r="6"/>
    <circle cx="1010" cy="180" r="6"/><circle cx="1000" cy="235" r="6"/><circle cx="820" cy="160" r="6"/>
    <circle cx="985" cy="95" r="6"/><circle cx="1030" cy="120" r="6"/><circle cx="895" cy="160" r="6"/>
  </g>
  <text x="925" y="410" text-anchor="middle" font-size="26" fill="#1a1a1a" font-weight="600">Point cloud</text>
  <text x="925" y="436" text-anchor="middle" font-size="18" fill="#1a1a1a">points + nearest-neighbour edges</text>

  <!-- Panel 4: Skeleton (human pose) -->
  <g stroke="#1a1a1a" stroke-width="3">
    <line x1="1290" y1="95" x2="1290" y2="150"/>
    <line x1="1240" y1="150" x2="1340" y2="150"/>
    <line x1="1290" y1="150" x2="1290" y2="215"/>
    <line x1="1240" y1="150" x2="1220" y2="205"/><line x1="1220" y1="205" x2="1210" y2="255"/>
    <line x1="1340" y1="150" x2="1360" y2="205"/><line x1="1360" y1="205" x2="1370" y2="255"/>
    <line x1="1290" y1="215" x2="1255" y2="215"/><line x1="1290" y1="215" x2="1325" y2="215"/>
    <line x1="1255" y1="215" x2="1248" y2="280"/><line x1="1248" y1="280" x2="1242" y2="330"/>
    <line x1="1325" y1="215" x2="1332" y2="280"/><line x1="1332" y1="280" x2="1338" y2="330"/>
  </g>
  <g fill="#f2f2f2" stroke="#1a1a1a" stroke-width="2.5">
    <circle cx="1290" cy="78" r="17"/>
    <circle cx="1240" cy="150" r="7"/><circle cx="1340" cy="150" r="7"/><circle cx="1290" cy="150" r="7"/>
    <circle cx="1220" cy="205" r="7"/><circle cx="1210" cy="255" r="7"/>
    <circle cx="1360" cy="205" r="7"/><circle cx="1370" cy="255" r="7"/>
    <circle cx="1290" cy="215" r="7"/><circle cx="1255" cy="215" r="7"/><circle cx="1325" cy="215" r="7"/>
    <circle cx="1248" cy="280" r="7"/><circle cx="1242" cy="330" r="7"/>
    <circle cx="1332" cy="280" r="7"/><circle cx="1338" cy="330" r="7"/>
  </g>
  <text x="1295" y="410" text-anchor="middle" font-size="26" fill="#1a1a1a" font-weight="600">Skeleton</text>
  <text x="1295" y="436" text-anchor="middle" font-size="18" fill="#1a1a1a">joints + bones</text>
</svg>
